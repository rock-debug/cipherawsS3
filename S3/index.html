<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ryan Portfolio - Version 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      border: 2px solid #38bdf8;
      padding: 30px;
      border-radius: 12px;
      background: #020617;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .badge {
      margin-top: 15px;
      padding: 8px 12px;
      background: #1e293b;
      border-radius: 6px;
      display: inline-block;
      font-size: 14px;
    }

    .version {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Hi, I'm Ryan 👋</h1>
    <p>This is my AWS S3 hosted website.</p>
    <div class="badge">🚀 Version 1 - Basic Deployment</div>
    <div class="version">Uploaded for versioning demonstration</div>
  </div>
</body>
</html>
